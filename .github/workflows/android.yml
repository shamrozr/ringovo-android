name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install JS deps
        run: npm install

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Bump version from run number
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          sed -i "s/versionCode 1/versionCode ${RUN_NUMBER}/" android/app/build.gradle
          sed -i "s/versionName \"1.0\"/versionName \"1.0.${RUN_NUMBER}\"/" android/app/build.gradle

      - name: Capacitor sync
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: cp android/app/build/outputs/apk/debug/app-debug.apk "ringovo-v1.0.${RUN_NUMBER}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ringovo-debug-apk
          path: ringovo-v1.0.${{ github.run_number }}.apk
          if-no-files-found: error

      - name: Publish Release
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_NUMBER: ${{ github.run_number }}
          SHA: ${{ github.sha }}
        run: |
          gh release create "v1.0.${RUN_NUMBER}" "ringovo-v1.0.${RUN_NUMBER}.apk" \
            --title "Ringovo Android v1.0.${RUN_NUMBER}" \
            --notes "Automated build from commit ${SHA}. Install the APK on Android (enable unknown sources), allow the mic, log in." \
            --latest
